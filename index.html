<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>班表同步工具</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { animation: spin 1s linear infinite; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.25s ease; }
  .drag-over { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
  :root { --tw-ring-color: #3b82f6; }
  input[type="time"] { min-width: 100px; }
  /* Prevent iOS Safari auto-zoom on focus */
  @media (hover: none) and (pointer: coarse) {
    input, select, textarea { font-size: 16px !important; }
  }
  /* Safe area for iPhone notch/home bar */
  body { padding-bottom: env(safe-area-inset-bottom, 0px); }
  #toast-container { bottom: max(1.25rem, env(safe-area-inset-bottom, 1.25rem)); }
  /* Better tap response */
  button, a, [onclick] { touch-action: manipulation; }
</style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

<div class="max-w-5xl mx-auto px-4 py-8">

  <!-- Header -->
  <div class="text-center mb-8 fade-in">
    <h1 class="text-3xl font-bold text-slate-800 tracking-tight">班表同步工具</h1>
    <p class="text-slate-500 mt-2 text-sm">上傳班表圖片 → AI 辨識班別 → 確認 → 匯出行事曆</p>
  </div>

  <!-- Steps Indicator -->
  <div id="steps-indicator" class="flex items-center justify-center mb-8 px-2"></div>

  <!-- Main Content -->
  <div id="step-content" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 fade-in"></div>

</div>

<!-- Toast container -->
<div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const PROVIDERS = {
  anthropic: {
    name: 'Anthropic Claude',
    defaultModel: 'claude-opus-4-7',
    models: [
      { id: 'claude-opus-4-7',          label: 'claude-opus-4-7',    note: '最強，較慢' },
      { id: 'claude-sonnet-4-6',         label: 'claude-sonnet-4-6',  note: '均衡' },
      { id: 'claude-haiku-4-5-20251001', label: 'claude-haiku-4-5',   note: '最快' },
    ],
    placeholder: 'sk-ant-api03-...',
    hint: 'console.anthropic.com',
    hintUrl: 'https://console.anthropic.com',
    badge: 'bg-violet-100 text-violet-700 border-violet-300',
  },
  openai: {
    name: 'OpenAI',
    defaultModel: 'gpt-4o',
    models: [
      { id: 'gpt-4o',      label: 'GPT-4o',      note: '最準確' },
      { id: 'gpt-4o-mini', label: 'GPT-4o mini', note: '省費用' },
    ],
    placeholder: 'sk-...',
    hint: 'platform.openai.com',
    hintUrl: 'https://platform.openai.com/api-keys',
    badge: 'bg-emerald-100 text-emerald-700 border-emerald-300',
  },
  google: {
    name: 'Google Gemini',
    defaultModel: 'gemini-1.5-flash',
    models: [
      { id: 'gemini-1.5-flash',    label: 'Gemini 1.5 Flash',    note: '穩定，推薦' },
      { id: 'gemini-1.5-flash-8b', label: 'Gemini 1.5 Flash 8B', note: '輕量省費' },
      { id: 'gemini-1.5-pro',      label: 'Gemini 1.5 Pro',      note: '高準確度' },
    ],
    placeholder: 'AIza...',
    hint: 'aistudio.google.com',
    hintUrl: 'https://aistudio.google.com/app/apikey',
    badge: 'bg-blue-100 text-blue-700 border-blue-300',
  },
};

const _savedProvider = localStorage.getItem('sched_provider') || 'anthropic';
// Migrate: clear any saved model that no longer exists in the models list
Object.keys(PROVIDERS).forEach(key => {
  const saved = localStorage.getItem('sched_model_' + key);
  if (saved && !PROVIDERS[key].models.some(m => m.id === saved)) {
    localStorage.removeItem('sched_model_' + key);
  }
});
// Normalize codeConfig keys to uppercase (one-time migration)
try {
  const rawCfg = localStorage.getItem('sched_code_cfg');
  if (rawCfg) {
    const cfg = JSON.parse(rawCfg);
    const normalized = {};
    Object.entries(cfg).forEach(([k, v]) => { normalized[k.toUpperCase()] = v; });
    localStorage.setItem('sched_code_cfg', JSON.stringify(normalized));
  }
} catch(e) {}
const _savedModel = localStorage.getItem('sched_model_' + _savedProvider) || PROVIDERS[_savedProvider].defaultModel;
const state = {
  step: 1,
  provider: _savedProvider,
  model: _savedModel,
  apiKey: localStorage.getItem('sched_api_key_' + _savedProvider) || localStorage.getItem('sched_api_key') || '',
  imageFile: null,
  imageDataUrl: null,
  imageBase64: null,
  imageMimeType: 'image/jpeg',
  rawData: null,
  selectedName: null,
  myShifts: {},        // { "1": "RO", "2": "M", ... }
  month: '',           // "2025-05"
  uniqueCodes: [],
  codeConfig: JSON.parse(localStorage.getItem('sched_code_cfg') || 'null') || defaultCodeConfig(),
  events: [],
};

function defaultCodeConfig() {
  return {
    'M':    { label: '早班',   type: 'work',   start: '09:00', end: '18:00' },
    'M8':   { label: '早班8H', type: 'work',   start: '09:00', end: '18:00' },
    'MA':   { label: '早班',   type: 'work',   start: '09:00', end: '18:00' },
    'MAB':  { label: '早班B',  type: 'work',   start: '09:00', end: '18:00' },
    'MA8':  { label: '早班8H', type: 'work',   start: '09:00', end: '18:00' },
    'E':    { label: '晚班',   type: 'work',   start: '13:00', end: '22:00' },
    'E8':   { label: '晚班8H', type: 'work',   start: '14:00', end: '22:00' },
    'EF':   { label: '晚班F',  type: 'work',   start: '13:00', end: '22:00' },
    'EC':   { label: '晚班C',  type: 'work',   start: '13:00', end: '22:00' },
    'H':    { label: '班',     type: 'work',   start: '10:00', end: '19:00' },
    'H8':   { label: '班8H',   type: 'work',   start: '10:00', end: '19:00' },
    'HK':   { label: '班K',    type: 'work',   start: '10:00', end: '19:00' },
    'P':    { label: '班',     type: 'work',   start: '10:00', end: '16:00' },
    'PF':   { label: '班F',    type: 'work',   start: '10:00', end: '16:00' },
    'KP':   { label: '班KP',   type: 'work',   start: '10:00', end: '19:00' },
    'CL':   { label: '收班',   type: 'work',   start: '14:00', end: '22:00' },
    'RO':   { label: '休假',   type: 'off',    start: '',      end: '' },
    'OL':   { label: '休假',   type: 'off',    start: '',      end: '' },
    'AL':   { label: '年假',   type: 'leave',  start: '',      end: '' },
    'MC':   { label: '病假',   type: 'leave',  start: '',      end: '' },
    'SL':   { label: '病假',   type: 'leave',  start: '',      end: '' },
    'D':    { label: '班',     type: 'work',   start: '10:00', end: '19:00' },
    'M8B':  { label: '早班8B', type: 'work',   start: '09:00', end: '18:00' },
    'ROP':  { label: '休假P',  type: 'off',    start: '',      end: '' },
    'M8CL': { label: '早/收',  type: 'work',   start: '09:00', end: '22:00' },
  };
}

// ─── Steps ────────────────────────────────────────────────────────────────────
const STEPS = [
  { id: 1, label: '上傳',   icon: '📤' },
  { id: 2, label: '辨識',   icon: '🔍' },
  { id: 3, label: '選人',   icon: '👤' },
  { id: 4, label: '確認',   icon: '✅' },
  { id: 5, label: '時間',   icon: '⏰' },
  { id: 6, label: '匯出',   icon: '📅' },
];

// ─── Render Engine ─────────────────────────────────────────────────────────────
function render() {
  renderSteps();
  const el = document.getElementById('step-content');
  el.classList.remove('fade-in');
  void el.offsetWidth;
  el.classList.add('fade-in');

  switch (state.step) {
    case 1: el.innerHTML = renderStep1(); bindStep1(); break;
    case 2: el.innerHTML = renderStep2(); runStep2(); break;
    case 3: el.innerHTML = renderStep3(); break;
    case 4: el.innerHTML = renderStep4(); break;
    case 5: el.innerHTML = renderStep5(); break;
    case 6: el.innerHTML = renderStep6(); break;
  }
}

function renderSteps() {
  document.getElementById('steps-indicator').innerHTML = STEPS.map((s, i) => {
    const done   = s.id < state.step;
    const active = s.id === state.step;
    const dot = done   ? 'bg-emerald-500 text-white ring-2 ring-emerald-300' :
                active ? 'bg-blue-600 text-white ring-2 ring-blue-300' :
                         'bg-slate-200 text-slate-400';
    const line = i < STEPS.length - 1
      ? `<div class="flex-1 h-0.5 mx-1 ${done ? 'bg-emerald-400' : 'bg-slate-200'}"></div>`
      : '';
    return `
      <div class="flex items-center min-w-0">
        <div class="flex flex-col items-center shrink-0">
          <div class="w-9 h-9 rounded-full flex items-center justify-center text-sm font-bold transition-all ${dot}">
            ${done ? '✓' : s.icon}
          </div>
          <span class="text-xs mt-1 ${active ? 'text-blue-600 font-semibold' : 'text-slate-400'} hidden sm:block whitespace-nowrap">${s.label}</span>
        </div>
        ${line}
      </div>`;
  }).join('');
}

// ─── Step 1: Upload ────────────────────────────────────────────────────────────
function renderStep1() {
  const prov = PROVIDERS[state.provider];
  return `
  <div class="space-y-6">
    <h2 class="text-xl font-bold text-slate-800">上傳班表圖片</h2>

    <!-- Provider Selector -->
    <div>
      <p class="text-sm font-semibold text-slate-700 mb-2">選擇 AI 供應商</p>
      <div class="grid grid-cols-3 gap-2">
        ${Object.entries(PROVIDERS).map(([key, p]) => `
          <button onclick="selectProvider('${key}')"
            class="p-3 border-2 rounded-xl text-left transition-all ${state.provider === key ? 'border-blue-500 bg-blue-50 shadow-sm' : 'border-slate-200 bg-white hover:border-slate-300'}">
            <div class="text-xs font-bold ${state.provider === key ? 'text-blue-700' : 'text-slate-600'} leading-tight">${p.name}</div>
            <div class="mt-1">
              <span class="text-xs px-1.5 py-0.5 rounded border ${p.badge} block truncate">${state.provider === key ? state.model : p.defaultModel}</span>
            </div>
          </button>`).join('')}
      </div>

      <!-- Model Sub-selector (shown for active provider) -->
      <div class="mt-2 border rounded-xl bg-slate-50 p-3">
        <p class="text-xs text-slate-500 mb-2 font-medium">模型版本</p>
        <div class="flex flex-wrap gap-2">
          ${PROVIDERS[state.provider].models.map(m => `
            <button onclick="selectModel('${m.id}')"
              class="px-3 py-1.5 rounded-lg border text-xs font-medium transition-all ${state.model === m.id ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 border-slate-300 hover:border-blue-400'}">
              ${m.label}
              <span class="ml-1 opacity-70">${m.note}</span>
            </button>`).join('')}
        </div>
      </div>
    </div>

    <!-- API Key -->
    <div class="rounded-xl bg-amber-50 border border-amber-200 p-4">
      <div class="flex items-start gap-2 mb-3">
        <span class="text-lg">🔑</span>
        <div>
          <p class="font-semibold text-amber-800 text-sm">${prov.name} API 金鑰</p>
          <p class="text-xs text-amber-700 mt-0.5">金鑰僅儲存於您的瀏覽器本機，不會上傳至任何伺服器。</p>
        </div>
      </div>
      <div class="flex gap-2">
        <input type="password" id="api-key-input" value="${state.apiKey}"
          placeholder="${prov.placeholder}"
          class="flex-1 border border-amber-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-amber-400">
        <button onclick="toggleKey()" class="px-3 py-2 border border-amber-300 bg-white rounded-lg text-sm hover:bg-amber-50">👁</button>
      </div>
      <p class="text-xs text-amber-600 mt-2">尚無金鑰？前往 <a href="${prov.hintUrl}" target="_blank" class="underline">${prov.hint}</a> 申請</p>
    </div>

    <!-- Drop Zone -->
    <div>
      <p class="text-sm font-semibold text-slate-700 mb-2">班表圖片</p>
      <div id="drop-zone"
        class="border-2 border-dashed border-slate-300 rounded-xl p-10 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition-all"
        onclick="document.getElementById('file-input').click()">
        <div class="text-5xl mb-3">🗓</div>
        <p class="font-medium text-slate-600">點擊選擇或拖曳班表圖片至此</p>
        <p class="text-xs text-slate-400 mt-1">支援 JPG、PNG、WEBP</p>
        <input type="file" id="file-input" accept="image/*" class="hidden">
      </div>

      ${state.imageDataUrl ? `
      <div class="mt-4 rounded-xl border overflow-hidden shadow-sm">
        <div class="bg-slate-50 px-4 py-2 border-b flex items-center gap-2">
          <span class="text-green-600 font-semibold text-sm">✓ 已選擇：${state.imageFile?.name || '班表圖片'}</span>
        </div>
        <img src="${state.imageDataUrl}" class="w-full object-contain max-h-72 bg-white">
      </div>
      ` : ''}
    </div>

    <!-- Tips -->
    <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 text-sm text-blue-700">
      <p class="font-semibold mb-1">📌 提示</p>
      <ul class="list-disc list-inside space-y-0.5 text-blue-600 text-xs">
        <li>圖片需清晰，日期與班別代碼需可辨識</li>
        <li>班表應為橫向排列（左→右 = 日期 1→31）</li>
        <li>若同月有多張圖片，請分次上傳</li>
      </ul>
    </div>

    <div class="flex justify-end">
      <button id="start-btn" onclick="startProcessing()"
        class="px-7 py-3 bg-blue-600 text-white rounded-xl font-semibold hover:bg-blue-700 transition-all disabled:opacity-40 disabled:cursor-not-allowed"
        ${!state.apiKey || !state.imageDataUrl ? 'disabled' : ''}>
        開始辨識 →
      </button>
    </div>
  </div>`;
}

function selectProvider(key) {
  state.provider = key;
  state.model = localStorage.getItem('sched_model_' + key) || PROVIDERS[key].defaultModel;
  state.apiKey = localStorage.getItem('sched_api_key_' + key) || '';
  render();
}

function selectModel(modelId) {
  state.model = modelId;
  localStorage.setItem('sched_model_' + state.provider, modelId);
  render();
}

function bindStep1() {
  const fi = document.getElementById('file-input');
  if (fi) fi.addEventListener('change', e => { const f = e.target.files[0]; if (f) loadFile(f); });

  const dz = document.getElementById('drop-zone');
  if (dz) {
    dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag-over'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
    dz.addEventListener('drop', e => {
      e.preventDefault(); dz.classList.remove('drag-over');
      const f = e.dataTransfer.files[0];
      if (f && f.type.startsWith('image/')) loadFile(f);
    });
  }

  const keyInput = document.getElementById('api-key-input');
  if (keyInput) keyInput.addEventListener('input', () => {
    state.apiKey = keyInput.value.trim();
    const btn = document.getElementById('start-btn');
    if (btn) btn.disabled = !state.apiKey || !state.imageDataUrl;
  });
}

function loadFile(file) {
  state.imageFile = file;
  state.imageMimeType = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = e => {
    state.imageDataUrl = e.target.result;
    state.imageBase64 = e.target.result.split(',')[1];
    render();
  };
  reader.readAsDataURL(file);
}

function toggleKey() {
  const el = document.getElementById('api-key-input');
  if (el) el.type = el.type === 'password' ? 'text' : 'password';
}

function startProcessing() {
  const keyInput = document.getElementById('api-key-input');
  if (keyInput) state.apiKey = keyInput.value.trim();
  localStorage.setItem('sched_provider', state.provider);
  localStorage.setItem('sched_api_key_' + state.provider, state.apiKey);
  localStorage.setItem('sched_api_key', state.apiKey); // legacy fallback
  if (!state.apiKey) { toast('請輸入 API 金鑰', 'error'); return; }
  if (!state.imageBase64) { toast('請上傳班表圖片', 'error'); return; }
  state.step = 2;
  render();
}

// ─── Step 2: Processing ────────────────────────────────────────────────────────
function renderStep2() {
  const prov = PROVIDERS[state.provider];
  return `
  <div class="text-center py-16 space-y-6">
    <div class="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full spinner mx-auto"></div>
    <div>
      <h2 class="text-xl font-bold text-slate-800">AI 辨識班表中</h2>
      <p id="proc-status" class="text-slate-500 text-sm mt-2">連接 ${prov.name}...</p>
      <span class="inline-block mt-2 text-xs px-2 py-0.5 rounded border ${prov.badge}">${state.model}</span>
    </div>
    <div class="max-w-xs mx-auto bg-slate-100 rounded-full h-2 overflow-hidden">
      <div id="proc-bar" class="h-full bg-blue-500 transition-all duration-700 rounded-full" style="width:5%"></div>
    </div>
    <p class="text-xs text-slate-400">辨識複雜班表通常需要 15-30 秒</p>
  </div>`;
}

function setProgress(msg, pct) {
  const s = document.getElementById('proc-status');
  const b = document.getElementById('proc-bar');
  if (s) s.textContent = msg;
  if (b) b.style.width = pct + '%';
}

const SCHEDULE_PROMPT = `你是一個精確的表格資料提取工具。請分析這張工作班表（排班表）圖片，以 JSON 格式輸出所有員工的班別資料。

班表結構：
- 最上方：月份、節假日/活動名稱
- 最左欄：員工編號（數字或空白）
- 第二欄：員工英文姓名
- 第三欄：所屬組別/類別（如 M UNIVERSE、WLG 等，可能為空）
- START 欄後是日期欄（1號到該月月底，由左至右依序排列）
- 每個日期格填有班別代碼（如 RO、M、E8、H、cl 等），空格代表無班
- 最右側：AL、CL 統計欄（忽略）

⚠️ 關鍵要求：
1. 嚴格由左至右讀取每一列的班別，確保每個代碼對應正確的日期序號
2. 輸出班別代碼一律轉換為大寫（如 ro → RO，e8 → E8，ma → MA）
3. 空白格或無內容填 null
4. 只輸出員工資料列，跳過標題列、合計列
5. 確保日期從 1 讀到該月最後一天，不可跳過任何欄位

只輸出 JSON，不要有任何其他文字或說明：

{
  "month": "YYYY-MM",
  "staff": [
    {
      "name": "員工姓名",
      "category": "組別（可為空字串）",
      "shifts": {
        "1": "代碼或null",
        "2": "代碼或null",
        "3": "代碼或null"
      }
    }
  ]
}`;

function extractJson(raw) {
  const fenced = raw.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fenced) return fenced[1];
  const start = raw.indexOf('{');
  const end   = raw.lastIndexOf('}');
  if (start !== -1 && end !== -1) return raw.slice(start, end + 1);
  return raw;
}

function showError(msg) {
  const SHORT_LIMIT = 120;
  const short = msg.length > SHORT_LIMIT ? msg.slice(0, SHORT_LIMIT) + '…' : msg;
  const hasMore = msg.length > SHORT_LIMIT;

  // Detect quota error and add helpful hint
  const isQuota = /quota|rate.limit|exceeded|429/i.test(msg);
  const hint = isQuota
    ? `<div class="mt-3 bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 text-xs text-amber-700 text-left max-w-sm mx-auto">
        💡 <b>配額超限</b>：請切換至其他模型版本，或確認 API 帳號已啟用付費計畫。
        Google 免費額度較多的版本為 <b>Gemini 1.5 Flash</b>。
       </div>`
    : '';

  document.getElementById('step-content').innerHTML = `
  <div class="text-center py-12 space-y-4">
    <div class="text-5xl">❌</div>
    <h2 class="text-xl font-bold text-red-600">辨識失敗</h2>
    <p class="text-slate-600 max-w-sm mx-auto text-sm" id="err-short">${escHtml(short)}</p>
    ${hasMore ? `
      <button onclick="document.getElementById('err-short').textContent='';document.getElementById('err-full').classList.remove('hidden');this.remove()"
        class="text-xs text-slate-400 underline">顯示完整錯誤</button>
      <p id="err-full" class="hidden text-slate-500 max-w-md mx-auto text-xs text-left bg-slate-50 border rounded-xl p-3 whitespace-pre-wrap">${escHtml(msg)}</p>
    ` : ''}
    ${hint}
    <button onclick="goTo(1)" class="px-6 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700">← 返回重試</button>
  </div>`;
}

async function runStep2() {
  await new Promise(r => setTimeout(r, 80));
  try {
    let rawText;
    if (state.provider === 'anthropic') rawText = await callAnthropic();
    else if (state.provider === 'openai')    rawText = await callOpenAI();
    else if (state.provider === 'google')    rawText = await callGoogle();
    else throw new Error('未知的 AI 供應商');

    setProgress('解析資料...', 85);
    state.rawData = JSON.parse(extractJson(rawText));
    state.month   = state.rawData.month || '';
    setProgress('完成！', 100);
    await new Promise(r => setTimeout(r, 400));
    state.step = 3;
    render();
  } catch (err) {
    showError(err.message);
  }
}

async function callAnthropic() {
  setProgress('傳送圖片至 Claude...', 20);
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': state.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-client-side-api-key-flag': 'true',
    },
    body: JSON.stringify({
      model: state.model,
      max_tokens: 8192,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: state.imageMimeType, data: state.imageBase64 } },
          { type: 'text', text: SCHEDULE_PROMPT }
        ]
      }]
    })
  });
  setProgress('Claude 分析中...', 55);
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e?.error?.message || `Anthropic API 錯誤 ${res.status}`);
  }
  const data = await res.json();
  return data.content?.[0]?.text || '';
}

async function callOpenAI() {
  setProgress(`傳送圖片至 ${state.model}...`, 20);
  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${state.apiKey}`,
    },
    body: JSON.stringify({
      model: state.model,
      max_tokens: 8192,
      messages: [{
        role: 'user',
        content: [
          { type: 'image_url', image_url: { url: `data:${state.imageMimeType};base64,${state.imageBase64}`, detail: 'high' } },
          { type: 'text', text: SCHEDULE_PROMPT }
        ]
      }]
    })
  });
  setProgress('GPT-4o 分析中...', 55);
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e?.error?.message || `OpenAI API 錯誤 ${res.status}`);
  }
  const data = await res.json();
  return data.choices?.[0]?.message?.content || '';
}

async function callGoogle() {
  setProgress(`傳送圖片至 ${state.model}...`, 20);
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${state.model}:generateContent?key=${state.apiKey}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{
        parts: [
          { inline_data: { mime_type: state.imageMimeType, data: state.imageBase64 } },
          { text: SCHEDULE_PROMPT }
        ]
      }],
      generationConfig: { maxOutputTokens: 8192 }
    })
  });
  setProgress('Gemini 分析中...', 55);
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    const msg = e?.error?.message || `Google API 錯誤 ${res.status}`;
    throw new Error(msg);
  }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

function nameCard(name, cat) {
  const sel = state.selectedName === name;
  return `<button onclick="selectName('${escAttr(name)}')"

function filterNames(q) {
  q = q.toLowerCase();
  document.querySelectorAll('#name-grid button').forEach(btn => {
    const n = btn.querySelector('.font-semibold')?.textContent?.toLowerCase() || '';
    btn.style.display = n.includes(q) ? '' : 'none';
  });
}

function selectName(name) {
  state.selectedName = name;
  document.querySelectorAll('#name-grid button').forEach(btn => {
    const n = btn.querySelector('.font-semibold')?.textContent;
    const sel = n === name;
    btn.className = btn.className
      .replace(/border-blue-600|bg-blue-50|shadow-sm|border-slate-200|bg-white/g, '')

      : ['border-slate-200', 'bg-white']));
  });

function confirmName() {
  if (!state.selectedName) return;
  const person = state.rawData.staff.find(s => s.name === state.selectedName);

  state.myShifts = {};

    if (c && c !== 'null' && c !== null) state.myShifts[d] = String(c).toUpperCase();
  });

  const codes = new Set(Object.values(state.myShifts));
  state.uniqueCodes = [...codes].filter(Boolean).sort();

    <!-- Code Summary -->
    <div class="bg-slate-50 rounded-xl p-4">
      <p class="text-sm font-semibold text-slate-600 mb-2">班別統計</p>
      <div class="flex flex-wrap gap-2">
        ${Object.entries(countMap).sort((a,b) => b[1]-a[1]).map(([c,n]) =>

function openEdit(day) {
  editingDay = day;
  const modal = document.getElementById('edit-modal');
  const title = document.getElementById('edit-modal-title');
  const input = document.getElementById('edit-code-input');
  if (!modal) return;
  const [yr, mo] = (state.month || '2025-05').split('-');
  title.textContent = `修改 ${yr}/${mo}/${String(day).padStart(2,'0')} 的班別`;
  input.value = state.myShifts[String(day)] || '';
  modal.style.display = 'flex';
  setTimeout(() => input.focus(), 50);
}

function closeEdit() {
  const m = document.getElementById('edit-modal');
  if (m) m.style.display = 'none';
}

function saveEdit() {
  const input = document.getElementById('edit-code-input');
  if (!input || !editingDay) return;
  const code = input.value.trim().toUpperCase() || null;
  if (code) state.myShifts[String(editingDay)] = code;
  else delete state.myShifts[String(editingDay)];

  const codes = new Set(Object.values(state.myShifts));
  state.uniqueCodes = [...codes].filter(Boolean).sort();
  closeEdit();
  render();
}

    </div>` : ''}
  </div>`;

function cfgSet(code, field, value) {
  if (!state.codeConfig[code]) state.codeConfig[code] = { label: code, type: 'work', start: '', end: '' };
  state.codeConfig[code][field] = value;
  localStorage.setItem('sched_code_cfg', JSON.stringify(state.codeConfig));
  if (field === 'type') render(); // refresh to show/hide time fields
}

function buildEvents() {
  const [yr, mo] = (state.month || '2025-05').split('-').map(Number);
  state.events = [];

  Object.entries(state.myShifts).forEach(([day, code]) => {
    if (!code) return;
    const cfg = state.codeConfig[code] || {};
    if (cfg.type === 'ignore') return;

    const date = `${yr}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

    if (cfg.type === 'off') return; // skip, no event

    if (cfg.type === 'leave') {
      state.events.push({ date, title: cfg.label || code, allDay: true, code });
    } else {
      state.events.push({
        date,
        title: cfg.label ? `${cfg.label}` : code,
        allDay: false,
        start: cfg.start || '09:00',
        end:   cfg.end   || '18:00',
        code,
      });
    }
  });

  state.events.sort((a, b) => a.date.localeCompare(b.date));
  state.step = 6;
  render();
}

function downloadICS() {
  const ics = buildICS();
  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `班表_${state.selectedName}_${state.month}.ics`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('已下載！請開啟檔案匯入行事曆', 'success');
}

function buildICS() {
  const stamp = new Date().toISOString().replace(/[-:.]/g,'').slice(0, 15) + 'Z';
  let out = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//班表同步工具//TW',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    `X-WR-CALNAME:${state.selectedName} ${state.month} 班表`,
    'X-WR-TIMEZONE:Asia/Taipei',
    'BEGIN:VTIMEZONE',
    'TZID:Asia/Taipei',
    'BEGIN:STANDARD',
    'DTSTART:19700101T000000',
    'TZOFFSETFROM:+0800',
    'TZOFFSETTO:+0800',
    'TZNAME:CST',
    'END:STANDARD',
    'END:VTIMEZONE',
  ];

  state.events.forEach((e, i) => {
    out.push('BEGIN:VEVENT');
    if (e.allDay) {
      const d0 = e.date.replace(/-/g, '');
      const d1 = nextDay(e.date).replace(/-/g, '');
      out.push(`DTSTART;VALUE=DATE:${d0}`);
      out.push(`DTEND;VALUE=DATE:${d1}`);
    } else {
      const ds = `${e.date.replace(/-/g,'')}T${e.start.replace(':','')}00`;
      const de = `${e.date.replace(/-/g,'')}T${e.end.replace(':','')}00`;
      out.push(`DTSTART;TZID=Asia/Taipei:${ds}`);
      out.push(`DTEND;TZID=Asia/Taipei:${de}`);
    }
    out.push(`SUMMARY:${icsEsc(e.title)}`);
    out.push(`DESCRIPTION:班別代碼：${icsEsc(e.code)}`);
    out.push(`UID:sched-${e.date}-${i}-${state.selectedName}@shift-sync`);
    out.push(`DTSTAMP:${stamp}`);
    out.push('END:VEVENT');
  });

  out.push('END:VCALENDAR');
  return out.join('\r\n');
}

function nextDay(dateStr) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + 1);
  return d.toISOString().split('T')[0];
}

function icsEsc(s) { return String(s).replace(/[,;\\]/g, '\\$&').replace(/\n/g, '\\n'); }

// ─── Utils ─────────────────────────────────────────────────────────────────────
function goTo(step) { state.step = step; render(); }

function resetAll() {
  state.step = 1;
  state.imageFile = null;
  state.imageDataUrl = null;
  state.imageBase64 = null;
  state.rawData = null;
  state.selectedName = null;
  state.myShifts = {};
  state.month = '';
  state.uniqueCodes = [];
  state.events = [];
  render();
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function escAttr(s) { return escHtml(s).replace(/'/g, '&#39;'); }

function toast(msg, type = 'info') {
  const colors = { success: 'bg-emerald-500', error: 'bg-red-500', info: 'bg-blue-500' };
  const el = document.createElement('div');
  el.className = `px-5 py-3 rounded-xl text-white font-medium shadow-lg text-sm ${colors[type] || colors.info} transition-opacity duration-300`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
}

// ─── Boot ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
